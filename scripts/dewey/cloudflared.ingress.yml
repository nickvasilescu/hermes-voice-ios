# Cloudflare tunnel ingress for dewey-bridge.momentumclaw.app
#
# IMPORTANT: this hostname is shared.
# - /hooks/*  → Hermes AgentPhone webhook (gateway loopback :8788)
# - everything else → Hermes Voice bridge (:8787)
#
# Do NOT point the whole hostname at :8787 — that breaks iMessage.
# Copy into /root/.cloudflared/config.yml on Dewey (credentials-file path
# is host-specific) and restart: cloudflared tunnel --config ... run

tunnel: 9fbb62c4-ba96-462c-b6dc-c665d3366d03
credentials-file: /root/.cloudflared/9fbb62c4-ba96-462c-b6dc-c665d3366d03.json
no-autoupdate: true
ingress:
  - hostname: dewey-bridge.momentumclaw.app
    path: /hooks/*
    service: http://127.0.0.1:8788
  - hostname: dewey-bridge.momentumclaw.app
    service: http://127.0.0.1:8787
  - service: http_status:404
