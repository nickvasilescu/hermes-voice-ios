name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  bridge:
    name: bridge (typecheck + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: bridge
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: bridge/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm test

  secrets-hygiene:
    name: no tracked .env files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          if git ls-files | grep -E '(^|/)\.env$'; then
            echo "A .env file is tracked by git. Remove it and rotate any credentials it contained."
            exit 1
          fi
          echo "OK: no tracked .env files"

  # iOS is written but intentionally NOT built here: this repo's CI runners
  # are Linux and there is no Xcode/iOS SDK available. A real pipeline would
  # add a macos-latest job running `xcodegen generate` + `xcodebuild test`
  # for ios/HermesVoice. See docs/ARCHITECTURE.md "Known limitations".
  ios-build:
    name: ios (not run — see job comment)
    runs-on: ubuntu-latest
    steps:
      - run: |
          echo "Skipping iOS build/test: no macOS runner configured in this repo yet."
          echo "ios/HermesVoice compiles against Xcode + an iOS SDK only; add a macos-latest"
          echo "job here (xcodegen generate && xcodebuild test) once that's available."
