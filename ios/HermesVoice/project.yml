name: HermesVoice
options:
  bundleIdPrefix: com.hermesvoice
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

configs:
  Debug: debug
  Release: release

settings:
  base:
    SWIFT_VERSION: "5.0"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1" # iPhone only, per "iPhone-first"

targets:
  HermesVoice:
    type: application
    platform: iOS
    sources:
      - path: App
      - path: Core
      - path: Features
      - path: Support
    resources:
      - path: Resources/Info.plist
        buildPhase: none # referenced via INFOPLIST_FILE, not copied as a resource
    settings:
      configs:
        Debug:
          xcconfig: Config/Debug.xcconfig
        Release:
          xcconfig: Config/Release.xcconfig
      base:
        INFOPLIST_FILE: Resources/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.hermesvoice.app
        GENERATE_INFOPLIST_FILE: NO
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
    # XcodeGen owns Resources/Info.plist via this block (adds CFBundle*
    # keys the hand-written file omitted). Custom keys live in `properties`.
    info:
      path: Resources/Info.plist
      properties:
        CFBundleDisplayName: Hermes Voice
        NSMicrophoneUsageDescription: Hermes Voice listens for your voice to hold a live conversation and relay tasks to Hermes.
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        # Populated per-configuration from Config/*.xcconfig.
        # BridgeBaseURL is a plain URL, not a secret. There is deliberately
        # no bearer token / bootstrap credential key here: the client
        # session token that authenticates every protected bridge call is
        # minted at runtime by POST /v1/session and held only in Keychain
        # via KeychainSessionStore, never in Info.plist/xcconfig — see
        # docs/SECURITY.md.
        BridgeBaseURL: $(BRIDGE_BASE_URL)
    dependencies:
      - package: WebRTC
    # Stasel WebRTC binary (~30–50MB). Chosen as the concrete engine for the
    # talking demo; see Core/Transport/StaselWebRTCEngine.swift.

  HermesVoiceTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: ../HermesVoiceTests
    dependencies:
      - target: HermesVoice
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES

packages:
  WebRTC:
    url: https://github.com/stasel/WebRTC
    from: "125.0.0"

schemes:
  HermesVoice:
    build:
      targets:
        HermesVoice: all
        HermesVoiceTests: [test]
    test:
      targets:
        - HermesVoiceTests
    run:
      config: Debug
